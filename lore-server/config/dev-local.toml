# =============================================================================
# Lore Server — Docker Compose Environment
# =============================================================================
# Overrides default.toml for running in the dev compose stack.
# Loaded via LORE_ENV=compose.

# =============================================================================
# Store Configuration — AWS mode backed by MinIO (S3) and DynamoDB Local
# =============================================================================

[immutable_store]
mode = "composite"
composite.local.mode = "local"
composite.durable.mode = "aws"

[immutable_store.composite.local.local]
path = "/data"
flush_delay_seconds = 10
max_capacity = 500000
max_size = 1073741824

[mutable_store]
mode = "aws"

[lock_store]
mode = "aws"

# =============================================================================
# TLS — use certs baked into the Docker image
# =============================================================================

[server.quic.certificate]
cert_file = "/etc/lore/certs/server.crt"
pkey_file = "/etc/lore/certs/server.key"

[server.quic_internal.certificate]
cert_file = "/etc/lore/certs/server.crt"
pkey_file = "/etc/lore/certs/server.key"
cert_chain = "/etc/lore/certs/ca.crt"

# Increase handler timeouts for slow emulated storage
[server.quic]
handler_timeout_seconds = 300

[server.grpc]
request_handler_timeout_seconds = 300

# Disable gRPC internal endpoint (single-node dev setup, no peers)
[server.grpc_internal]
enabled = false

# HTTP presigned URL HMAC key (dev-only, not a real secret)
[server.http]
presigned_url_hmac_key = "deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef"

# =============================================================================
# AWS Plugin — S3 (MinIO) and DynamoDB Local endpoints
# =============================================================================

[plugins.aws.immutable_store]
s3_bucket = "lore-immutable-store-dev"
s3_endpoint_url = "http://minio:9000"
s3_region = "us-east-1"
s3_force_path_style = true
dynamodb_fragments_table = "lore-fragments-dev"
dynamodb_metadata_table = "lore-fragment-metadata-dev"
dynamodb_endpoint_url = "http://dynamodb:9090"
dynamodb_region = "us-east-1"
timeout_millis = 120000

[plugins.aws.mutable_store]
dynamodb_table = "lore-mutable-store-dev"
dynamodb_endpoint_url = "http://dynamodb:9090"
dynamodb_region = "us-east-1"
timeout_millis = 120000

[plugins.aws.lock_store]
dynamodb_table = "lore-locks-dev"
dynamodb_endpoint_url = "http://dynamodb:9090"
dynamodb_region = "us-east-1"
timeout_millis = 120000

# =============================================================================
# Telemetry — full export to Grafana OTEL-LGTM stack
# =============================================================================

[telemetry]
additional_labels = { region = "local" }

[telemetry.exporter]
endpoint = "http://grafana:4317"
queue_size = 8192
timeout = 5000

[telemetry.logger]
enable_otlp = false
format = "json"

[telemetry.logger.output]
file = "/var/log/lore/server.log"

[telemetry.traces]
sample_rate = 1.0
sample_rate_low_tier = 1.0
