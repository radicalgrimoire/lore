# =============================================================================
# Lore Server Default Configuration
# =============================================================================
# This file contains the default settings for all environments.
# Environment-specific configs (ci.toml, gamedev.toml, etc.) override these.
#
# NOTE: This file is BAKED INTO THE SERVER BINARY at compile time via
# `include_str!` (see `Settings::load` in lore-server/src/settings.rs). It is
# the single source of truth for the compiled-in defaults, so the server starts
# with sensible settings even when no external config files are present.
#
# In addition, if a `default.toml` is found on disk inside the config directory
# at startup (the directory set by `--config` / `LORE_CONFIG_PATH`, defaulting
# to `lore-server/config`), it is layered on top of the compiled-in defaults.
# This allows operators to override defaults without requiring a rebuild.
# Editing this file changes the compiled-in defaults and requires a rebuild to
# take effect.

[server]
connection_close_timeout_seconds = 5
runtime_shutdown_timeout_seconds = 25

# public facing server settings
[server.quic]
enabled = true
host = "0.0.0.0"
port = 41337
# we verify clients via their Auth token
verify_client_certs = false
idle_timeout = 30_000
keep_alive = 500
max_bidi_streams = 8
num_listeners = 10
transport_bits_per_second = 1_073_741_824  # 1 gbit/s
transport_rtt = 100  # 100 ms
handler_timeout_seconds = 50

# internal replication endpoint — opt in per environment, mTLS required
[server.quic_internal]
enabled = false
host = "0.0.0.0"
port = 41340
idle_timeout = 30_000
keep_alive = 500
max_bidi_streams = 8
num_listeners = 10
transport_bits_per_second = 10_737_418_240  # 10 gbit/s
transport_rtt = 100  # 100 ms
handler_timeout_seconds = 50

[server.grpc]
enabled = true
host = "0.0.0.0"
port = 41337
request_handler_timeout_seconds = 50

[server.grpc_public_services.lock_service]
max_encoding_message_size = 16777216

# server-to-server gRPC internal endpoint — opt in per environment, mTLS required
[server.grpc_internal]
enabled = false
host = "0.0.0.0"
port = 41340
request_handler_timeout_seconds = 50

[server.http]
enabled = true
host = "0.0.0.0"
port = 41339
max_file_size = 10_485_760 # 10MB
request_timeout_seconds = 300
request_body_timeout_seconds = 3600
available_interval_seconds = 30
available_timeout_seconds = 5
store_health_check = false

# =============================================================================
# Store Configuration
# =============================================================================

[immutable_store]
mode = "local"

[mutable_store]
mode = "local"

[lock_store]
mode = "local"

# =============================================================================
# Local Store Configuration (Predefined Type)
# =============================================================================
# `path` is intentionally omitted: when unset, the server derives a path under
# the system temporary directory (`<tmp>/lore-server`) at startup. Set `path`
# explicitly in an override file to pin the store to a fixed location.

[immutable_store.local]
flush_delay_seconds = 10

[mutable_store.local]
flush_delay_seconds = 10

# =============================================================================
# Tokio Runtime Configuration
# =============================================================================

[tokio]
max_blocking_threads = 512

# =============================================================================
# Telemetry Configuration
# =============================================================================

[telemetry.logger]
enable_otlp = false
format = "json"
output = "stdout"

[telemetry.metrics]
export_interval_millis = 30000
sample_interval_millis = 10000

[telemetry.traces]
sample_rate = 0.05
sample_rate_low_tier = 0.001

# =============================================================================
# Notification Configuration
# =============================================================================

[notification]
mode = "local"

# =============================================================================
# Other Features Configuration
# =============================================================================

[feature]
history_step_size = 100

# Max source-side change count for v1 thin-client RevisionDiff 3-way before aborting (resource_exhausted).
# revision_diff_source_cap = 100000

# Parallel history-walk permits used by revision::diff3 to bound conflict resolution.
# revision_diff_history_walk_concurrency = 24
